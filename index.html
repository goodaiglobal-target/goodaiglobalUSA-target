<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>goodai global USA - TARGET — weekly sales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0a;
    --ink-soft: #6e6e6e;
    --paper: #ffffff;
    --card: #ffffff;
    --line: #e4e4e4;
    --line-strong: #0a0a0a;
    --hover: #f6f6f6;
    --red: #e0182d;
    --radius: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: clamp(2.5rem, 6vw, 5rem) clamp(1.25rem, 5vw, 2rem) 4rem;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1.25rem;
    border-bottom: 2px solid var(--line-strong);
    margin-bottom: clamp(2.5rem, 6vw, 3.5rem);
  }
  .logo {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 1.05rem;
    letter-spacing: -0.02em;
  }
  .logo .target { color: var(--red); }
  .internal-tag {
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--paper);
    background: var(--ink);
    padding: 0.3rem 0.6rem;
    border-radius: 2px;
  }
  header { margin-bottom: clamp(2.5rem, 6vw, 3.5rem); }
  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 1rem;
  }
  h1 {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 8vw, 3.8rem);
    line-height: 0.98;
    letter-spacing: -0.03em;
    margin-bottom: 0.9rem;
  }
  .lede {
    font-size: 1.02rem;
    color: var(--ink-soft);
    max-width: 48ch;
  }
  .section-label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 700;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .reports { list-style: none; display: flex; flex-direction: column; gap: 0; }
  .report {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    border-bottom: 1px solid var(--line);
    padding: 1.25rem 0.25rem;
    text-decoration: none;
    color: inherit;
    transition: padding-left 0.18s ease, background 0.18s ease;
  }
  .report:first-child { border-top: 1px solid var(--line); }
  .report:hover, .report:focus-visible {
    background: var(--hover);
    padding-left: 1rem;
    outline: none;
  }
  .report:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .marker {
    flex: none;
    width: 48px; height: 48px;
    border-radius: 2px;
    background: var(--ink);
    color: var(--paper);
    display: grid;
    place-items: center;
    font-family: 'Archivo', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .report-body { flex: 1; min-width: 0; }
  .report-title {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .report-meta {
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-top: 0.15rem;
  }
  .badge {
    flex: none;
    font-size: 0.64rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--paper);
    background: var(--ink);
    border-radius: 2px;
    padding: 0.3rem 0.6rem;
  }
  .chev { flex: none; color: var(--ink); transition: transform 0.18s ease; font-size: 1.1rem; }
  .report:hover .chev { transform: translateX(4px); }
  .empty {
    padding: 2rem 0.25rem;
    color: var(--ink-soft);
    font-size: 0.95rem;
  }
  footer {
    margin-top: clamp(3rem, 7vw, 4.5rem);
    padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    font-size: 0.8rem;
    color: var(--ink-soft);
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="logo">goodai global USA - <span class="target">TARGET</span></div>
      <div class="internal-tag">Internal</div>
    </div>

    <header>
      <div class="eyebrow">Sales Reporting</div>
      <h1>Weekly Sales</h1>
      <p class="lede">Internal weekly sales reports across all brands. Select a week to view the full breakdown.</p>
    </header>

    <div class="section-label">Reports</div>

    <ul class="reports" id="reportList"></ul>

    <footer>
      goodai global USA · Internal use only
    </footer>
  </div>

<!-- ============================================================= -->
<!--  매주 여기만 수정하세요                                          -->
<!--  새 리포트를 올리면, 아래 목록 맨 위에 한 줄만 추가하면 됩니다.      -->
<!--  { file: "파일이름.html", title: "보일 제목" },                  -->
<!--  - file  = 실제 올린 파일 이름과 똑같이 (대소문자까지)             -->
<!--  - title = 카드에 크게 보일 제목                                 -->
<!--  마커(W1 등)와 "Latest" 뱃지는 자동으로 처리됩니다.               -->
<!-- ============================================================= -->
<script>
  const reports = [
    { file: "jul-wk1.html", title: "July - Week 1" },
    { file: "jun-wk5.html", title: "June - Week 5" },
    { file: "jun-wk4.html", title: "June - Week 4" },
    { file: "jun-wk3.html", title: "June - Week 3" },
    { file: "jun-wk2.html", title: "June - Week 2" },
    // 다음 주에 새 리포트를 올리면, 바로 윗줄 위에 이렇게 추가하세요:
    // { file: "jul-wk1.html", title: "July - Week 1" },
  ];

  // 아래는 건드릴 필요 없습니다 (카드 자동 생성)
  (function () {
    const meta = "";
    const listEl = document.getElementById("reportList");

    if (!reports.length) {
      listEl.innerHTML = '<li class="empty">\uc544\uc9c1 \ub4f1\ub85d\ub41c \ub9ac\ud3ec\ud2b8\uac00 \uc5c6\uc2b5\ub2c8\ub2e4.</li>';
      return;
    }

    function weekMarker(title) {
      const m = title.match(/week\s*(\d+)/i);
      if (m) return "W" + m[1];
      return title.trim().charAt(0).toUpperCase();
    }

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    listEl.innerHTML = reports.map(function (r, i) {
      const isLatest = i === 0;
      const badge = isLatest ? '<span class="badge">Latest</span>' : '';
      return (
        '<li>' +
          '<a class="report" href="./' + encodeURI(r.file) + '">' +
            '<span class="marker">' + escapeHtml(weekMarker(r.title)) + '</span>' +
            '<span class="report-body">' +
              '<span class="report-title">' + escapeHtml(r.title) + '</span>' +
              (meta ? '<span class="report-meta">' + meta + '</span>' : '') +
            '</span>' +
            badge +
            '<span class="chev" aria-hidden="true">\u2192</span>' +
          '</a>' +
        '</li>'
      );
    }).join("");
  })();
</script>
</body>
</html>
