<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>goodai global USA - TARGET — weekly sales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0a;
    --ink-soft: #6e6e6e;
    --paper: #ffffff;
    --card: #ffffff;
    --line: #e4e4e4;
    --line-strong: #0a0a0a;
    --hover: #f6f6f6;
    --red: #e0182d;
    --radius: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: clamp(2.5rem, 6vw, 5rem) clamp(1.25rem, 5vw, 2rem) 4rem;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1.25rem;
    border-bottom: 2px solid var(--line-strong);
    margin-bottom: clamp(2.5rem, 6vw, 3.5rem);
  }
  .logo {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 1.05rem;
    letter-spacing: -0.02em;
  }
  .logo .target { color: var(--red); }
  .internal-tag {
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--paper);
    background: var(--ink);
    padding: 0.3rem 0.6rem;
    border-radius: 2px;
  }
  header { margin-bottom: clamp(2.5rem, 6vw, 3.5rem); }
  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 1rem;
  }
  h1 {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 8vw, 3.8rem);
    line-height: 0.98;
    letter-spacing: -0.03em;
    margin-bottom: 0.9rem;
  }
  .lede {
    font-size: 1.02rem;
    color: var(--ink-soft);
    max-width: 48ch;
  }
  .section-label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 700;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* ---- Month groups (accordion) ---- */
  .months { display: flex; flex-direction: column; gap: 0.9rem; }
  .month {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .month-head {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    background: var(--card);
    border: none;
    cursor: pointer;
    padding: 1.05rem 1.15rem;
    text-align: left;
    font-family: inherit;
    color: inherit;
    transition: background 0.15s ease;
  }
  .month-head:hover { background: var(--hover); }
  .month-head:focus-visible { outline: 2px solid var(--ink); outline-offset: -2px; }
  .month-name {
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: -0.02em;
    flex: 1;
  }
  .month-count {
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .month-latest {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--paper);
    background: var(--red);
    border-radius: 2px;
    padding: 0.25rem 0.5rem;
  }
  .caret {
    flex: none;
    font-size: 0.85rem;
    color: var(--ink-soft);
    transition: transform 0.2s ease;
  }
  .month.open .caret { transform: rotate(180deg); }

  .month-body {
    display: none;
    border-top: 1px solid var(--line);
    padding: 0 1.15rem;
  }
  .month.open .month-body { display: block; }

  .reports { list-style: none; display: flex; flex-direction: column; gap: 0; }
  .report {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    border-bottom: 1px solid var(--line);
    padding: 1.15rem 0.15rem;
    text-decoration: none;
    color: inherit;
    transition: padding-left 0.18s ease, background 0.18s ease;
  }
  .report:last-child { border-bottom: none; }
  .report:hover, .report:focus-visible {
    background: var(--hover);
    padding-left: 0.75rem;
    outline: none;
  }
  .report:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .marker {
    flex: none;
    width: 44px; height: 44px;
    border-radius: 2px;
    background: var(--ink);
    color: var(--paper);
    display: grid;
    place-items: center;
    font-family: 'Archivo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .report-body { flex: 1; min-width: 0; }
  .report-title {
    font-size: 1.02rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .report-meta {
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-top: 0.15rem;
  }
  .badge {
    flex: none;
    font-size: 0.64rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--paper);
    background: var(--ink);
    border-radius: 2px;
    padding: 0.3rem 0.6rem;
  }
  .chev { flex: none; color: var(--ink); transition: transform 0.18s ease; font-size: 1.1rem; }
  .report:hover .chev { transform: translateX(4px); }
  .empty {
    padding: 2rem 0.25rem;
    color: var(--ink-soft);
    font-size: 0.95rem;
  }
  footer {
    margin-top: clamp(3rem, 7vw, 4.5rem);
    padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    font-size: 0.8rem;
    color: var(--ink-soft);
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="logo">goodai global USA - <span class="target">TARGET</span></div>
      <div class="internal-tag">Internal</div>
    </div>

    <header>
      <div class="eyebrow">Sales Reporting</div>
      <h1>Weekly Sales</h1>
      <p class="lede">Internal weekly sales reports across all brands. Pick a month, then select a week to view the full breakdown.</p>
    </header>

    <div class="section-label">Reports</div>

    <div class="months" id="monthList"></div>

    <footer>
      goodai global USA · Internal use only
    </footer>
  </div>

<!-- ============================================================= -->
<!--  매주 여기만 수정하세요                                          -->
<!--  새 리포트를 올리면, 아래 목록 맨 위에 한 줄만 추가하면 됩니다.      -->
<!--  { file: "파일이름.html", title: "보일 제목" },                  -->
<!--  - file  = 실제 올린 파일 이름과 똑같이 (대소문자까지)             -->
<!--  - title = 카드에 크게 보일 제목 (반드시 월 이름 포함: 예 "July - Week 1") -->
<!--  월별 그룹 / 마커(W1) / "Latest" 뱃지 / 펼침은 전부 자동입니다.     -->
<!-- ============================================================= -->
<script>
  const reports = [
    { file: "jul-wk2.html", title: "July - Week 2" },
    { file: "jul-wk1.html", title: "July - Week 1" },
    { file: "jun-wk5.html", title: "June - Week 5" },
    { file: "jun-wk4.html", title: "June - Week 4" },
    { file: "jun-wk3.html", title: "June - Week 3" },
    { file: "jun-wk2.html", title: "June - Week 2" },
    // 다음 주에 새 리포트를 올리면, 바로 윗줄 위에 이렇게 추가하세요:
    // { file: "jul-wk2.html", title: "July - Week 2" },
  ];

  // ================= 아래는 건드릴 필요 없습니다 =================
  (function () {
    const listEl = document.getElementById("monthList");

    if (!reports.length) {
      listEl.innerHTML = '<div class="empty">\uc544\uc9c1 \ub4f1\ub85d\ub41c \ub9ac\ud3ec\ud2b8\uac00 \uc5c6\uc2b5\ub2c8\ub2e4.</div>';
      return;
    }

    const MONTHS = ["January","February","March","April","May","June",
                    "July","August","September","October","November","December"];

    function escapeHtml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function weekMarker(title) {
      const m = title.match(/week\s*(\d+)/i);
      if (m) return "W" + m[1];
      return title.trim().charAt(0).toUpperCase();
    }

    // 제목에서 월 이름을 찾아 월 index(0-11)를 돌려줌. 못 찾으면 -1.
    function monthIndex(title) {
      for (let i = 0; i < MONTHS.length; i++) {
        if (new RegExp(MONTHS[i], "i").test(title)) return i;
      }
      return -1;
    }

    // reports 배열 순서(최신이 위) 그대로 월별로 묶는다.
    const groups = [];          // [{ month, items:[...] }]
    const groupByMonth = {};
    let latestKey = null;       // 전체에서 가장 위(=최신) 리포트가 속한 그룹

    reports.forEach(function (r, i) {
      const mi = monthIndex(r.title);
      const key = mi >= 0 ? MONTHS[mi] : "Other";
      if (!groupByMonth[key]) {
        const g = { key: key, month: mi >= 0 ? MONTHS[mi] : "Other", items: [] };
        groupByMonth[key] = g;
        groups.push(g);
      }
      groupByMonth[key].items.push(r);
      if (i === 0) latestKey = key;   // 배열 첫 항목이 최신
    });

    listEl.innerHTML = groups.map(function (g) {
      const isLatestMonth = g.key === latestKey;
      const openClass = isLatestMonth ? " open" : "";
      const latestTag = isLatestMonth ? '<span class="month-latest">Latest</span>' : '';
      const countLabel = g.items.length + (g.items.length === 1 ? " report" : " reports");

      const rows = g.items.map(function (r, idx) {
        // 최신 그룹의 맨 첫 리포트에만 Latest 뱃지
        const isLatestReport = isLatestMonth && idx === 0;
        const badge = isLatestReport ? '<span class="badge">Latest</span>' : '';
        return (
          '<li>' +
            '<a class="report" href="./' + encodeURI(r.file) + '">' +
              '<span class="marker">' + escapeHtml(weekMarker(r.title)) + '</span>' +
              '<span class="report-body">' +
                '<span class="report-title">' + escapeHtml(r.title) + '</span>' +
              '</span>' +
              badge +
              '<span class="chev" aria-hidden="true">\u2192</span>' +
            '</a>' +
          '</li>'
        );
      }).join("");

      return (
        '<div class="month' + openClass + '">' +
          '<button class="month-head" type="button" aria-expanded="' + (isLatestMonth ? 'true' : 'false') + '">' +
            '<span class="month-name">' + escapeHtml(g.month) + '</span>' +
            '<span class="month-count">' + countLabel + '</span>' +
            latestTag +
            '<span class="caret" aria-hidden="true">\u25be</span>' +
          '</button>' +
          '<div class="month-body"><ul class="reports">' + rows + '</ul></div>' +
        '</div>'
      );
    }).join("");

    // 펼치기/접기
    listEl.querySelectorAll(".month-head").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const monthEl = btn.closest(".month");
        const open = monthEl.classList.toggle("open");
        btn.setAttribute("aria-expanded", open ? "true" : "false");
      });
    });
  })();
</script>
</body>
</html>
